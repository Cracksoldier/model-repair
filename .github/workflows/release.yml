name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifacts (e.g. v0.4.0). Defaults to "dev".'
        required: false
        default: 'dev'
      create_release:
        description: 'Create a GitHub Release and attach both AppImage and ZIP'
        type: boolean
        required: false
        default: false
      next_version:
        description: 'Version to set in CMakeLists.txt after release (e.g. 0.4.1). Leave blank to skip.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          git cmake ninja base-devel \
          cgal eigen3 boost gmp mpfr \
          qt6-base \
          wget fuse2 file

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DMODELREPAIR_BUILD_TESTS=OFF \
          -DMODELREPAIR_ENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Install into AppDir
      run: cmake --install build --prefix AppDir/usr --component Runtime

    - name: Register custom libraries with the system linker
      run: |
        cp -P AppDir/usr/lib/libmodelrepair.so* /usr/lib/
        cp -P AppDir/usr/lib/libOpenMesh*.so* /usr/lib/
        cp -P build/_deps/lib3mf-build/lib3mf.so* /usr/lib/
        ldconfig

    - name: Download linuxdeploy + Qt plugin
      run: |
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Create AppImage
      env:
        APPIMAGE_EXTRACT_AND_RUN: "1"
        QMAKE: /usr/bin/qmake6
        OUTPUT: model-repair-${{ inputs.version }}-x86_64.AppImage
        NO_STRIP: "1"
      run: |
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --plugin qt \
          --output appimage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: appimage
        path: model-repair-${{ inputs.version }}-x86_64.AppImage
        if-no-files-found: error

  build-linux-cli:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          git cmake ninja base-devel \
          cgal eigen3 boost gmp mpfr \
          patchelf

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DMODELREPAIR_BUILD_GUI=OFF \
          -DMODELREPAIR_BUILD_TESTS=OFF \
          -DMODELREPAIR_ENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Bundle into tarball
      run: |
        DIST=dist/model-repair-cli
        mkdir -p "$DIST"

        cp build/cli/model-repair "$DIST/"
        cp -P build/src/libmodelrepair.so* "$DIST/"
        cp -P build/_deps/lib3mf-build/lib3mf.so* "$DIST/"
        find build -name "libOpenMesh*.so*" ! -path "*/CMakeFiles/*" \
          -exec cp -P {} "$DIST/" \;

        # Two ldd sweeps to catch transitive deps of newly-copied libs
        for pass in 1 2; do
          for f in "$DIST"/model-repair "$DIST"/*.so*; do
            ldd "$f" 2>/dev/null
          done \
            | awk '{print $3}' \
            | grep -v -E '^(not|)$' \
            | grep -v -E '(linux-vdso|libc\.so\.|libm\.so\.|libpthread\.so\.|libdl\.so\.|librt\.so\.|ld-linux)' \
            | sort -u \
            | while read lib; do [ -f "$lib" ] && cp -u "$lib" "$DIST/"; done
        done

        # Make every ELF find its bundled siblings via $ORIGIN rpath
        for f in "$DIST"/model-repair "$DIST"/*.so*; do
          [ -f "$f" ] && patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
        done

        mkdir -p "$DIST/LICENSES"
        cp LICENSE LICENSES/* "$DIST/LICENSES/"

        tar -czf model-repair-${{ inputs.version }}-linux-cli-x64.tar.gz \
          -C dist model-repair-cli

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-cli-tarball
        path: model-repair-*-linux-cli-x64.tar.gz
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4

    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cgal
          mingw-w64-ucrt-x86_64-eigen3
          mingw-w64-ucrt-x86_64-boost
          mingw-w64-ucrt-x86_64-gmp
          mingw-w64-ucrt-x86_64-mpfr
          mingw-w64-ucrt-x86_64-qt6-base
          mingw-w64-ucrt-x86_64-qt6-tools

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DMODELREPAIR_BUILD_TESTS=OFF \
          -DMODELREPAIR_ENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Bundle into dist/
      run: |
        DIST=dist/model-repair
        mkdir -p "$DIST"

        GUI_EXE=$(find build -name "model-repair-gui.exe" ! -path "*/CMakeFiles/*" | head -1)
        CLI_EXE=$(find build -name "model-repair.exe"     ! -path "*/CMakeFiles/*" | head -1)
        MR_DLL=$(find  build -name "libmodelrepair.dll"   ! -path "*/CMakeFiles/*" ! -path "*/_deps/*" | head -1)
        cp "$GUI_EXE" "$DIST/"
        cp "$CLI_EXE" "$DIST/"
        cp "$MR_DLL"  "$DIST/"

        [ -f build/_deps/lib3mf-build/lib3mf.dll ] && \
          cp build/_deps/lib3mf-build/lib3mf.dll "$DIST/"

        /ucrt64/bin/windeployqt6 --no-translations "$DIST/model-repair-gui.exe"

        for f in "$DIST"/*.exe "$DIST"/*.dll; do
          ldd "$f" 2>/dev/null
        done \
          | grep '/ucrt64/bin' | awk '{print $3}' | sort -u \
          | xargs -I{} cp -u {} "$DIST/"

    - name: Create ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path dist\model-repair `
          -DestinationPath "model-repair-${{ inputs.version }}-windows-x64.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: model-repair-${{ inputs.version }}-windows-x64.zip
        if-no-files-found: error

  release:
    needs: [build-linux, build-linux-cli, build-windows]
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}

    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: appimage
        path: appimage

    - name: Download Linux CLI artifact
      uses: actions/download-artifact@v4
      with:
        name: linux-cli-tarball
        path: linux-cli-tarball

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-zip
        path: windows-zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        name: model-repair ${{ inputs.version }}
        draft: true
        files: |
          appimage/model-repair-${{ inputs.version }}-x86_64.AppImage
          linux-cli-tarball/model-repair-${{ inputs.version }}-linux-cli-x64.tar.gz
          windows-zip/model-repair-${{ inputs.version }}-windows-x64.zip

  bump-version:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release && inputs.next_version != '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Bump version in CMakeLists.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"
        NEXT="${{ inputs.next_version }}"
        NEXT="${NEXT#v}"
        sed -i -E "s/(project\(model-repair VERSION )[0-9]+\.[0-9]+\.[0-9]+/\1${NEXT}/" CMakeLists.txt
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CMakeLists.txt
        git commit -m "Bump version to ${NEXT}"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        git push origin HEAD:${{ github.ref_name }}
