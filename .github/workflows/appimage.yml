name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifact (e.g. v0.2.0). Defaults to "dev".'
        required: false
        default: 'dev'
      create_release:
        description: 'Create a GitHub Release and attach the AppImage'
        type: boolean
        required: false
        default: false
      next_version:
        description: 'Version to set in CMakeLists.txt after release (e.g. 0.2.0). Leave blank to skip.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest

    steps:
    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          git cmake ninja base-devel \
          cgal eigen3 boost gmp mpfr \
          qt6-base \
          wget fuse2 file

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DMODELREPAIR_BUILD_TESTS=OFF \
          -DMODELREPAIR_ENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Install into AppDir
      run: cmake --install build --prefix AppDir/usr --component Runtime

    - name: Bundle license files
      run: |
        mkdir -p AppDir/usr/share/licenses/model-repair
        cp LICENSE LICENSES/* AppDir/usr/share/licenses/model-repair/

    - name: Register custom libraries with the system linker
      run: |
        cp -P AppDir/usr/lib/libmodelrepair.so* /usr/lib/
        cp -P build/_deps/lib3mf-build/lib3mf.so* /usr/lib/
        # Register AppDir/usr/lib itself so ldd can resolve any FetchContent-built
        # shared libraries (e.g. OpenMesh) that cmake --install placed there.
        echo "$PWD/AppDir/usr/lib" > /etc/ld.so.conf.d/appdir.conf
        ldconfig

    - name: Download linuxdeploy + Qt plugin
      run: |
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Create AppImage
      env:
        APPIMAGE_EXTRACT_AND_RUN: "1"
        QMAKE: /usr/bin/qmake6
        OUTPUT: model-repair-${{ inputs.version }}-x86_64.AppImage
        NO_STRIP: "1"
      run: |
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --plugin qt \
          --output appimage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: model-repair-${{ inputs.version }}-x86_64
        path: model-repair-*.AppImage
        if-no-files-found: error

    - name: Create GitHub Release
      if: ${{ inputs.create_release }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        name: model-repair ${{ inputs.version }}
        files: model-repair-*.AppImage
        draft: true

    - name: Bump version in CMakeLists.txt
      if: ${{ inputs.create_release && inputs.next_version != '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"
        NEXT="${{ inputs.next_version }}"
        NEXT="${NEXT#v}"
        sed -i -E "s/(project\(model-repair VERSION )[0-9]+\.[0-9]+\.[0-9]+/\1${NEXT}/" CMakeLists.txt
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CMakeLists.txt
        git commit -m "Bump version to ${NEXT}"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        git push origin HEAD:${{ github.ref_name }}
