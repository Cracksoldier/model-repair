name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifact (e.g. v0.2.0). Defaults to "dev".'
        required: false
        default: 'dev'
      create_release:
        description: 'Create a GitHub Release and attach the AppImage'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Install system dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          git cmake ninja base-devel \
          cgal eigen3 boost gmp mpfr \
          qt6-base qt6-opengl \
          wget fuse2 file

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DMODELREPAIR_BUILD_TESTS=OFF \
          -DMODELREPAIR_ENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Install into AppDir
      run: cmake --install build --prefix AppDir/usr --component Runtime

    - name: Download linuxdeploy + Qt plugin
      run: |
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Create AppImage
      env:
        APPIMAGE_EXTRACT_AND_RUN: "1"
        QMAKE: /usr/bin/qmake6
        OUTPUT: model-repair-${{ inputs.version }}-x86_64.AppImage
      run: |
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --plugin qt \
          --output appimage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: model-repair-${{ inputs.version }}-x86_64
        path: model-repair-*.AppImage
        if-no-files-found: error

    - name: Create GitHub Release
      if: ${{ inputs.create_release }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        name: model-repair ${{ inputs.version }}
        files: model-repair-*.AppImage
        draft: true
